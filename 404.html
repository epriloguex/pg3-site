<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Page Not Found | PG3 AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='30' fill='%231a1814' stroke='%23d4af37' stroke-width='2'/><text x='32' y='40' text-anchor='middle' font-family='Georgia,serif' font-size='24' font-weight='bold' fill='%23d4af37'>PG</text></svg>" type="image/svg+xml">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(212,175,55,.14), transparent 30%),
        linear-gradient(180deg, #050505 0%, #0a0a0a 45%, #070707 100%);
      color:#f5f2e8;
      text-align:center;
      padding:24px;
    }
    .container{max-width:520px}
    .logo{
      width:120px;height:120px;
      object-fit:contain;
      background:radial-gradient(circle at 50% 45%, #14110a 0%, #000 70%);
      border-radius:50%;
      padding:18px;box-sizing:border-box;
      border:1px solid rgba(212,175,55,.55);
      box-shadow:
        0 0 0 1px rgba(212,175,55,.25),
        0 0 24px 4px rgba(212,175,55,.45),
        0 0 60px 10px rgba(212,175,55,.28);
      margin:0 auto 28px;
      display:block;
    }
    h1{
      font-size:clamp(64px,12vw,96px);
      font-weight:800;
      letter-spacing:-.04em;
      background:linear-gradient(180deg,#fff4cb 0%, #f0d67a 35%, #c69413 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent;
      line-height:1;
      margin-bottom:14px;
    }
    h2{
      font-size:22px;font-weight:700;
      color:#f5f2e8;
      margin-bottom:12px;
    }
    p{
      color:#bdb6a6;font-size:16px;line-height:1.7;
      margin-bottom:28px;
    }
    .cta{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      padding:14px 28px;border-radius:999px;
      background:linear-gradient(180deg,#f2d57a,#d4af37);
      color:#16120b;font-weight:800;letter-spacing:.02em;
      box-shadow:0 10px 30px rgba(212,175,55,.18);
      text-decoration:none;
      transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }
    .cta:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(212,175,55,.3);filter:brightness(1.08)}
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="/assets/pg3ai-logo.jpg" alt="PG3 AI logo" width="120" height="120" />
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a class="cta" href="/">Back to Home</a>
  </div>
</body>
</html>
